name: Enterprise Test Suite & Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov httpx
        
    - name: Run Pytest with Coverage
      env:
        GEMINI_API_KEY: "AIzaFAKE_test_key_1234567890"
        ADMIN_TOKEN: "fake_admin_token"
      run: |
        python -m pytest tests/ --cov=app --cov-report=xml --cov-report=term
        
    - name: Upload Coverage Report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Run Frontend State Assertions
      run: node tests/frontend_assertions.spec.js
